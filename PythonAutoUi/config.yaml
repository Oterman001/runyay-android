# 小红书跑步博主自动关注 - 配置文件

# 设备配置
device:
  # USB 连接时填设备序列号（adb devices 查看），WiFi 连接时填 IP:PORT
  # 留空则自动连接唯一已连接的设备
  serial: ""

# 运行模式
dry_run: false  # true=只打日志不实际关注，调试完成后改为 false

# 每日限额控制
daily_follow_limit: 97          # 每天最多关注人数（建议 30-45，安全上限）
max_follows_per_session: 100    # 单次会话最多关注人数（之后强制休息）
session_break_seconds: 30       # 单次会话超限后的休息时长（秒）
active_hours: [6, 24]           # 仅在此时间段内运行（24小时制）

# ── 运行模式 ──────────────────────────────────────────────────────────────────
# auto（随机整合两种路径，默认）/ recommend（仅推荐列表）/ my_following（仅我的关注列表探索）
mode: "my_following"

# 推荐列表滚动页数（每页约 6-8 个推荐用户）
pages_per_recommend: 200

# 横向推荐最大深入层数
#   1 = 仅处理推荐列表本身，不深入横向推荐
#   5 = 关注后最多深入 5 层横向推荐（每层最多 3 人）
max_depth: 5

# 关注模式
#   true  = 直接点推荐列表里的"关注"按钮（快速，无评分过滤）
#   false = 进入博主主页后再关注（有评分过滤 + 横向推荐深入）
direct_follow: false

# 互关评分阈值（0-100），>= 此分值才关注
min_score_threshold: 60

# ── 我的关注列表探索模式（my_following）专用配置 ──────────────────────────
# 运行模式：my_following — 从我的关注列表进入各博主关注列表探索新跑友
# 从我的关注列表最多取几个博主作为探索入口（每个入口进入其关注列表）
max_bloggers_to_explore: 500
# 单次运行累计关注超过此数则强制重启应用，0 = 不重启
restart_after_follows: 50
random_skip_ratio: 0.12

# ── 博主关注列表探索（可选路径）────────────────────────────────────────────
# 在确认为互关跑步博主主页后，额外点击其"关注数"进入关注列表寻找更多博主
# 仅在 direct_follow: false 且 depth=1 时触发；无法进入则静默跳过
explore_following_list: false
# 每位博主关注列表最多处理几个用户（防止停留过久）
max_following_list_users: 8

# ── 笔记探索 & 点赞/收藏配置 ────────────────────────────────────────────────
note_explore:
  # 要探索的首页 Tab（按顺序）：关注 = 已关注博主的笔记；发现 = 系统推荐
  tabs: ["关注", "发现"]
  # 每个 Tab 最多滚动页数（每页约 6-8 张卡片）
  pages_per_tab: 10
  # 每日点赞上限（建议 ≤ 60，过多易触发限流）
  daily_like_limit: 10
  # 每日收藏上限
  daily_collect_limit: 8
  # 命中跑步笔记后点赞概率（0.0-1.0），1.0 = 测试用全量命中
  like_probability: 1.0
  # 命中跑步笔记后收藏概率
  collect_probability: 1.0
  # 每张笔记的最短"阅读"停留时间（秒）
  min_read_seconds: 2.0
  # 最长"阅读"停留时间（秒）
  max_read_seconds: 4.0

# 延迟配置（高斯分布参数：均值, 标准差，单位秒）
delays:
  tap:
    mu: 0.8
    sigma: 0.3
  between_profiles:
    mu: 3.0
    sigma: 1.2
  post_follow:
    mu: 10.0
    sigma: 4.0
  long_break_probability: 0.15  # 关注后触发长暂停的概率
  long_break_extra_min: 20      # 长暂停额外增加时间下限（秒）
  long_break_extra_max: 60      # 长暂停额外增加时间上限（秒）
  scroll_pause:
    mu: 1.5
    sigma: 0.6
